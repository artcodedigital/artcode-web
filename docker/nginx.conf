# Internal Nginx for the artcode-web container. It serves the Next.js static
# export and listens on 3000; the host-level Nginx (artcode-infra `web` role)
# reverse-proxies the public domain to 127.0.0.1:3000.
server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Next.js static export uses clean URLs (e.g. /about -> about.html).
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Hashed build assets are immutable and safe to cache aggressively.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}